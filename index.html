<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Karla Pérez | Impulsa</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px 14px;
      min-height: 100vh;
      background: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
      color: #555;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .tarjeta {
      width: 100%;
      max-width: 470px;
      background: #ffffff;
      overflow: hidden;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.14);
      text-align: center;
    }

    .foto {
      width: 100%;
      height: 470px;
      object-fit: cover;
      object-position: center top;
      display: block;
      background: #073742;
    }

    .contenido {
      padding: 24px 28px 30px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      font-weight: 400;
      line-height: 1.05;
      color: #585858;
    }

    .puesto {
      margin: 5px 0 25px;
      font-size: 25px;
      color: #777;
    }

    .datos {
      display: grid;
      gap: 12px;
      margin-bottom: 23px;
    }

    .dato {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #5d5d5d;
      text-decoration: none;
      font-size: 22px;
      overflow-wrap: anywhere;
    }

    .icono {
      width: 30px;
      font-size: 25px;
      color: #63268c;
    }

    .acciones {
      display: grid;
      gap: 12px;
    }

    .boton {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 4px;
      background: #214f5d;
      color: white;
      text-decoration: none;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    .boton:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .boton-contacto {
      background: #b9833e;
    }

    .boton-whatsapp {
      background: #198754;
    }

    .pie {
      margin-top: 20px;
      font-size: 13px;
      color: #999;
    }

    @media (max-width: 520px) {
      body {
        padding: 0;
        background: #ffffff;
      }

      .tarjeta {
        max-width: none;
        box-shadow: none;
      }

      .foto {
        height: 62vh;
        max-height: 500px;
        min-height: 390px;
      }

      h1 {
        font-size: 36px;
      }

      .puesto {
        font-size: 22px;
      }

      .dato {
        font-size: 19px;
      }
    }
  </style>
</head>

<body>

  <main class="tarjeta">

    <img
      class="foto"
      src="karla.jpg"
      alt="Fotografía de Karla Pérez"
    >

    <section class="contenido">

      <img
        class="logo"
        src="logo.png"
        alt="Impulsa"
      >

      <h1>Karla Pérez</h1>
      <p class="puesto">Asesor de Ventas</p>

      <div class="datos">

        <a class="dato" href="tel:+50239971562">
          <span class="icono">☎</span>
          <span>3997-1562</span>
        </a>

        <a class="dato" href="mailto:kperez@impulsa.com.gt">
          <span class="icono">✉</span>
          <span>kperez@impulsa.com.gt</span>
        </a>

      </div>

      <div class="acciones">

        <button class="boton boton-contacto" onclick="guardarContacto()">
          Guardar contacto
        </button>

        <a
          class="boton boton-whatsapp"
          href="https://wa.me/50239971562"
          target="_blank"
          rel="noopener noreferrer"
        >
          Contactar por WhatsApp
        </a>

        <a
          class="boton"
          href="https://impulsa.com.gt"
          target="_blank"
          rel="noopener noreferrer"
        >
          Visitar IMPULSA
        </a>

      </div>

      <div class="pie">
        IMPULSA
      </div>

    </section>

  </main>

  <script>
    function guardarContacto() {
      const vcard = [
        "BEGIN:VCARD",
        "VERSION:3.0",
        "N:Pérez;Karla;;;",
        "FN:Karla Pérez",
        "ORG:IMPULSA",
        "TITLE:Asesor de Ventas",
        "TEL;TYPE=CELL:+50239971562",
        "EMAIL;TYPE=INTERNET:kperez@impulsa.com.gt",
        "URL:https://impulsa.com.gt",
        "END:VCARD"
      ].join("\r\n");

      const archivo = new Blob([vcard], {
        type: "text/vcard;charset=utf-8"
      });

      const enlace = document.createElement("a");
      enlace.href = URL.createObjectURL(archivo);
      enlace.download = "Karla-Perez.vcf";

      document.body.appendChild(enlace);
      enlace.click();
      document.body.removeChild(enlace);

      URL.revokeObjectURL(enlace.href);
    }
  </script>

</body>
</html>
