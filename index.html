<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Karla Pérez | IMPULSA</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px 14px;
      background: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .tarjeta {
      width: 100%;
      max-width: 540px;
      background: #ffffff;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.14);
      overflow: hidden;
    }

    .imagen-tarjeta {
      width: 100%;
      height: auto;
      display: block;
    }

    .acciones {
      display: grid;
      gap: 12px;
      padding: 20px;
    }

    .boton {
      width: 100%;
      padding: 15px 18px;
      border: none;
      border-radius: 4px;
      color: #ffffff;
      text-align: center;
      text-decoration: none;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
    }

    .guardar {
      background: #bd8744;
    }

    .whatsapp {
      background: #198754;
    }

    .llamar {
      background: #62258b;
    }

    .sitio {
      background: #214f5d;
    }

    .boton:hover {
      opacity: 0.9;
    }

    @media (max-width: 560px) {
      body {
        padding: 0;
        background: #ffffff;
      }

      .tarjeta {
        max-width: none;
        box-shadow: none;
      }

      .acciones {
        padding: 16px;
      }
    }
  </style>
</head>

<body>

  <main class="tarjeta">

    <img
      class="imagen-tarjeta"
      src="karla.jpg"
      alt="Tarjeta digital de Karla Pérez, Asesor de Ventas de IMPULSA"
    >

    <section class="acciones">

      <button
        class="boton guardar"
        type="button"
        onclick="guardarContacto()"
      >
        Guardar contacto
      </button>

      <a
        class="boton whatsapp"
        href="https://wa.me/50239971562"
        target="_blank"
        rel="noopener noreferrer"
      >
        Contactar por WhatsApp
      </a>

      <a
        class="boton llamar"
        href="tel:+50239971562"
      >
        Llamar a Karla
      </a>

      <a
        class="boton sitio"
        href="https://impulsa.com.gt"
        target="_blank"
        rel="noopener noreferrer"
      >
        Visitar IMPULSA
      </a>

    </section>

  </main>

  <script>
    function guardarContacto() {
      const vcard = [
        "BEGIN:VCARD",
        "VERSION:3.0",
        "N:Pérez;Karla;;;",
        "FN:Karla Pérez",
        "ORG:IMPULSA",
        "TITLE:Asesor de Ventas",
        "TEL;TYPE=CELL:+50239971562",
        "EMAIL;TYPE=INTERNET:kperez@impulsa.com.gt",
        "URL:https://impulsa.com.gt",
        "END:VCARD"
      ].join("\r\n");

      const archivo = new Blob([vcard], {
        type: "text/vcard;charset=utf-8"
      });

      const enlace = document.createElement("a");
      enlace.href = URL.createObjectURL(archivo);
      enlace.download = "Karla-Perez.vcf";

      document.body.appendChild(enlace);
      enlace.click();
      document.body.removeChild(enlace);

      setTimeout(() => {
        URL.revokeObjectURL(enlace.href);
      }, 1000);
    }
  </script>

</body>
</html>
